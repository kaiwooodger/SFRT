vascular_sink_model:
  description: Anatomy-aware vascular uptake and falsification settings used for sink-enabled comparisons.
  tissue_modifiers:
    tumor_cytokine_multiplier: 2.0
    hypoxic_ros_scale: 0.12
    hypoxic_cytokine_multiplier: 2.7
  uptake:
    arteries:
      ros: 0.05
      cytokine: 0.70
    veins:
      ros: 0.05
      cytokine: 0.90
  falsification_controls:
    phase36a:
      - no_sink
      - uniform_body_sink_mass_matched
      - blurred_vessel_sink_sigma10mm
      - peri_gtv_shell_sink_5_20mm
      - distance_decay_sink_lambda15mm
    phase37a:
      - ap_flip_sink
      - si_flip_sink
      - local_dropout_sink_20mm
      - randomized_displacement_sink
      - uniform_body_sink_mass_matched
      - blurred_vessel_sink_sigma10mm
      - peri_gtv_shell_sink_5_20mm
      - distance_decay_sink_lambda15mm
  geometric_parameters:
    blur_sigma_mm: 10.0
    peri_gtv_shell_inner_mm: 5.0
    peri_gtv_shell_outer_mm: 20.0
    distance_decay_lambda_mm: 15.0
    local_dropout_radius_mm: 20.0
    anterior_posterior_shift_mm: 12.0
