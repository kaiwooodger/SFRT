biology_model:
  description: Locked non-local bystander and effective-dose reinterpretation settings used in the PMB submission.
  linear_quadratic:
    alpha_per_gy: 0.03
    beta_per_gy2: 0.003
  diffusion:
    ros: 0.8
    cytokine: 1.2
  decay:
    ros: 0.2
    cytokine: 0.001
  emission:
    emax_ros: 1.5
    emax_cytokine: 0.8
    gamma_per_gy: 0.35
  nonlocal_scaling_factor_s: 0.0029365813
  hazard_weights:
    ros: 0.4
    cytokine: 0.4
    immune: 0.2
  temporal_integration:
    steps: 400
    dt: 0.12
    t_final: 48.0
    default_progress_interval: 100
  systemic_immune_penalty:
    max_penalty: 1.0
    half_volume_cm3: 5.0
  numerical:
    laplacian_mode: nearest
    boundary_condition_interpretation: zero_flux_approximation
